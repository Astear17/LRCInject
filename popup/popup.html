<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LRCInject</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#ff2d55" stroke-width="2"/>
          <path d="M9 18V5l12-2v13" stroke="#ff2d55" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="18" r="2" fill="#ff2d55"/>
          <circle cx="18" cy="16" r="2" fill="#ff2d55"/>
        </svg>
        <h1>LRCInject</h1>
      </div>
      <div class="status" id="status">Connecting...</div>
    </header>

    <section class="track-info" id="trackInfo" style="display:none;">
      <div class="track-title" id="trackTitle"></div>
      <div class="track-artist" id="trackArtist"></div>
      <div class="playback-state" id="playbackState"></div>
    </section>

    <section class="no-track" id="noTrack" style="display:none;">
      <p>Connecting to Apple Music...</p>
    </section>

    <section class="actions" id="actions" style="display:none;">
      <div class="import-area">
        <input type="file" id="fileInput" accept=".lrc,.srt,.json" hidden>
        <button class="btn btn-primary" id="importBtn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 1v10M4 7l4 4 4-4M2 13h12"/>
          </svg>
          Import LRC / SRT / JSON
        </button>
      </div>

      <div class="lyrics-status" id="lyricsStatus" style="display:none;">
        <div class="lyrics-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M9 18V5l12-2v13M6 18a3 3 0 110-6 3 3 0 010 6zm12-2a3 3 0 110-6 3 3 0 010 6z"/>
          </svg>
          <span id="lyricsLineCount">0</span> lines loaded
        </div>
        <button class="btn btn-xs btn-danger" id="removeBtn">Remove</button>
      </div>

      <div class="controls" id="controlsRow" style="display:none;">
        <button class="btn btn-secondary" id="toggleBtn">Toggle Lyrics</button>
      </div>

      <div class="offset-control" id="offsetControl" style="display:none;">
        <label>Timing Offset</label>
        <div class="offset-row">
          <button class="btn btn-sm" id="offsetMinus5">-0.5s</button>
          <button class="btn btn-sm" id="offsetMinus">-0.1s</button>
          <span class="offset-value" id="offsetValue">+0.00s</span>
          <button class="btn btn-sm" id="offsetPlus">+0.1s</button>
          <button class="btn btn-sm" id="offsetPlus5">+0.5s</button>
        </div>
      </div>

      <div class="option-row">
        <label class="toggle-label">
          <input type="checkbox" id="useCustomCheck">
          Use custom lyrics over native
        </label>
      </div>

      <div class="option-row">
        <label class="toggle-label">
          <input type="checkbox" id="debugCheck">
          Debug mode
        </label>
      </div>
    </section>

    <div class="retry-area" id="retryArea" style="display:none;">
      <button class="btn btn-secondary" id="retryBtn">Retry Connection</button>
    </div>

    <footer class="footer">
      <span>LRCInject v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
